<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝓦𝓲𝓵𝓵 𝔂𝓸𝓾 𝓶𝓪𝓻𝓻𝔂 𝓶𝓮 , 𝓙𝓪𝓪𝓷 ?❤️?</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        background: linear-gradient(to right, #ff758c, #ff7eb3);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Great Vibes', cursive;
        font-size: 60px
        
    }
     
    .container {
        text-align: center;
        color: white;
    }

    h1 {
        font-size: 3rem;
        margin-bottom: 40px;
    }

    .buttons {
        position: relative;
        height: 200px;
    }

    button {
        padding: 15px 40px;
        font-size: 18px;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        position: absolute;
        transition: 0.3s;
    }

    #yesBtn {
        background-color: #28a745;
        left: 40%;
        top: 50%;
        transform: translate(-50%, -50%);
    }

    #noBtn {
        background-color: #dc3545;
        left: 60%;
        top: 50%;
        transform: translate(-50%, -50%);
    }

    #message {
        font-size: 2rem;
        margin-top: 30px;
        display: none;
    }
    body {
    margin: 0;
    height: 100vh;

    animation: slideshow 15s infinite;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

@keyframes slideshow {
    0% {
        background-image: url("Image/mine3.jpeg");
    }
    33% {
        background-image: url("Image/mine3.jpeg");
    }
    66% {
        background-image: url("Image/mine3.jpeg");
    }
    100% {
        background-image: url("Image/mine3.jpeg");
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>𝓦𝓘𝓵𝓵 𝔂𝓸𝓾 𝓶𝓪𝓻𝓻𝔂 𝓶𝓮, 𝓝𝓪𝓯𝓲𝓼𝓪?💍❤️</h1>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😢</button>
    </div>

    <div id="message">𝓨𝓪𝔂𝔂𝔂𝔂! 𝓘 𝓛𝓸𝓿𝓮 𝓨𝓸𝓾 𝓢𝓸 𝓜𝓾𝓬𝓱 𝓜𝔂 𝓙𝓪𝓪𝓷 ❤️💍</div>
</div>

<script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const message = document.getElementById("message");

    // Move "No" button randomly when mouse hovers
    noBtn.addEventListener("mouseover", function() {
        const x = Math.random() * (window.innerWidth - 150);
        const y = Math.random() * (window.innerHeight - 100);

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    // When Yes is clicked
    yesBtn.addEventListener("click", function() {
        message.style.display = "block";
    });
</script>

</body>
</html>
